name: CI Release (Legacy)

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Publish self-contained binary
        run: |
          dotnet publish src/Studywise.Cli/Studywise.Cli.csproj -c Release --runtime linux-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -o ./publish/linux-x64

      - name: Create NuGet package
        run: |
          dotnet pack src/Studywise.Cli/Studywise.Cli.csproj -c Release --no-build -o ./publish

      - name: Package binary
        run: |
          cd ./publish/linux-x64 && zip -r ../studywise-linux-x64.zip . && cd ..

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: legacy-${{ github.run_number }}
          name: Legacy Release ${{ github.run_number }}
          artifacts: ./publish/*.zip,./publish/*.nupkg
          draft: true
