name: CI Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore Studywise.Cli.sln

      - name: Build
        run: dotnet build Studywise.Cli.sln -c Release --no-restore

      - name: Run unit tests
        run: dotnet test test/Studywise.Cli.UnitTests/Studywise.Cli.UnitTests.csproj -c Release --no-build --verbosity minimal

      - name: Run integration tests
        run: dotnet test test/Studywise.Cli.IntegrationTests/Studywise.Cli.IntegrationTests.csproj -c Release --no-build --verbosity minimal

  release:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Publish self-contained binary
        run: |
          dotnet publish src/Studywise.Cli/Studywise.Cli.csproj -c Release --runtime linux-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=false -o ./publish/linux-x64

      - name: Create NuGet package
        run: |
          dotnet pack src/Studywise.Cli/Studywise.Cli.csproj -c Release --no-build -o ./publish

      - name: Package binary
        run: |
          cd ./publish/linux-x64 && zip -r ../studywise-linux-x64.zip . && cd ..

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v0.1.0
          name: Release v0.1.0
          artifacts: ./publish/*.zip,./publish/*.nupkg
          draft: true
