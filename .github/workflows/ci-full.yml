name: CI Full

on:
  pull_request_review:
    types:
      - submitted
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  actions: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  MIN_COVERAGE_PERCENT: 1

jobs:
  docs-only-check:
    if: github.event_name == 'pull_request_review' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.docs.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect docs-only changes
        id: docs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            echo "Manual trigger - running full CI"
          else
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            changed_files="$(git diff --name-only "$base_sha" "$head_sha")"

            if [ -z "$changed_files" ]; then
              echo "docs_only=true" >> "$GITHUB_OUTPUT"
            elif echo "$changed_files" | grep -qvE '(\.md$|docs/|\.txt$|\.cursor/skills/|\.opencode/skills/|\.codex/skills/)'; then
              echo "docs_only=false" >> "$GITHUB_OUTPUT"
            else
              echo "docs_only=true" >> "$GITHUB_OUTPUT"
            fi
          fi

  build-and-test:
    name: Build and quality checks
    needs: [docs-only-check]
    if: >-
      (github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved' &&
      github.event.pull_request.base.ref == 'main') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        if: needs.docs-only-check.outputs.docs_only != 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: Skip - docs only
        if: needs.docs-only-check.outputs.docs_only == 'true'
        run: echo "Skipping CI - only docs changed"

      - name: Setup .NET
        if: needs.docs-only-check.outputs.docs_only != 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore dependencies
        if: needs.docs-only-check.outputs.docs_only != 'true'
        run: dotnet restore Studywise.Cli.sln

      - name: Build (warnings as errors)
        if: needs.docs-only-check.outputs.docs_only != 'true'
        run: dotnet build Studywise.Cli.sln -c Release --no-restore "/p:TreatWarningsAsErrors=true"

      - name: Run analyzer quality gate
        if: needs.docs-only-check.outputs.docs_only != 'true'
        run: dotnet format analyzers Studywise.Cli.sln --verify-no-changes --no-restore --verbosity minimal

      - name: Run dependency vulnerability check
        if: needs.docs-only-check.outputs.docs_only != 'true'
        run: |
          set +e
          output=$(dotnet list Studywise.Cli.sln package --vulnerable --include-transitive 2>&1)
          exit_code=$?
          set -e

          if echo "$output" | grep -q "has the following vulnerable packages"; then
            echo "$output"
            echo "ERROR: Vulnerable packages detected"
            exit 1
          fi

          if [ $exit_code -ne 0 ]; then
            echo "$output"
            exit 1
          fi

          echo "No vulnerable packages found"

      - name: Run unit tests with coverage
        if: needs.docs-only-check.outputs.docs_only != 'true'
        run: dotnet test test/Studywise.CLI.UnitTests/Studywise.Cli.UnitTests/Studywise.CLI.UnitTests.csproj -c Release --no-build --verbosity minimal --collect:"XPlat Code Coverage" --logger "trx;LogFileName=unit-tests.trx" --results-directory artifacts/test-results/unit

      - name: Run integration tests with coverage
        if: needs.docs-only-check.outputs.docs_only != 'true'
        run: dotnet test test/Studywise.CLI.IntegrationTests/Studywise.Cli.IntegrationTests/Studywise.CLI.IntegrationTests.csproj -c Release --no-build --verbosity minimal --collect:"XPlat Code Coverage" --logger "trx;LogFileName=integration-tests.trx" --results-directory artifacts/test-results/integration

      - name: Get Dev Proxy version
        if: needs.docs-only-check.outputs.docs_only != 'true'
        id: devproxy-version
        run: |
          DEVPROXY_VERSION=$(curl -s https://api.github.com/repos/microsoft/dev-proxy/releases/latest | jq .tag_name -r)
          echo "DEVPROXY_VERSION=$DEVPROXY_VERSION" >> $GITHUB_ENV
          echo "Dev Proxy version: $DEVPROXY_VERSION"

      - name: Cache Dev Proxy
        if: needs.docs-only-check.outputs.docs_only != 'true'
        id: cache-devproxy
        uses: actions/cache@v4
        with:
          path: ./devproxy
          key: devproxy-${{ env.DEVPROXY_VERSION }}

      - name: Install Dev Proxy
        if: needs.docs-only-check.outputs.docs_only != 'true' && steps.cache-devproxy.outputs.cache-hit != 'true'
        run: bash -c "$(curl -sL https://aka.ms/devproxy/setup.sh)"

      - name: Start Dev Proxy
        if: needs.docs-only-check.outputs.docs_only != 'true'
        run: |
          ./devproxy/devproxy --detach --port 8000
          echo "Dev Proxy starting..."
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/ 2>/dev/null | grep -q "200"; then
              echo "Dev Proxy is ready on port 8000"
              exit 0
            fi
            sleep 2
          done
          echo "WARNING: Dev Proxy may not be ready"

      - name: Run E2E tests with coverage
        if: needs.docs-only-check.outputs.docs_only != 'true'
        env:
          STUDYWISE_API_KEY: test-key
          STUDYWISE_API_BASE_URL: http://127.0.0.1:8000
        run: dotnet test test/Studywise.CLI.E2ETests/Studywise.CLI.E2ETests.csproj -c Release --no-build --verbosity minimal --collect:"XPlat Code Coverage" --logger "trx;LogFileName=e2e-tests.trx" --results-directory artifacts/test-results/e2e

      - name: Enforce coverage threshold
        if: needs.docs-only-check.outputs.docs_only != 'true'
        id: coverage-check
        env:
          MIN_COVERAGE_PERCENT: ${{ env.MIN_COVERAGE_PERCENT }}
        run: |
          python - <<'PY'
          import glob
          import os
          import sys
          import xml.etree.ElementTree as ET

          files = glob.glob("artifacts/test-results/**/coverage.cobertura.xml", recursive=True)
          if not files:
            print("No coverage files found")
            sys.exit(1)

          covered = 0
          valid = 0
          for path in files:
            root = ET.parse(path).getroot()
            covered += int(root.attrib.get("lines-covered", "0"))
            valid += int(root.attrib.get("lines-valid", "0"))

          if valid == 0:
            print("Coverage files found but lines-valid is zero")
            sys.exit(1)

          pct = (covered / valid) * 100.0
          minimum = float(os.environ.get("MIN_COVERAGE_PERCENT", "1"))
          print(f"Coverage: {pct:.2f}% ({covered}/{valid}), required: {minimum:.2f}%")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"minimumCoverage={pct:.2f}\n")
            f.write(f"covered={covered}\n")
            f.write(f"valid={valid}\n")

          if pct < minimum:
            print("Coverage threshold not met")
            sys.exit(1)
          PY

      - name: Write coverage summary
        if: needs.docs-only-check.outputs.docs_only != 'true'
        run: |
          cat > coverage-summary.json << EOF
          {
            "minimumCoverage": ${{ steps.coverage-check.outputs.minimumCoverage }},
            "covered": ${{ steps.coverage-check.outputs.covered }},
            "valid": ${{ steps.coverage-check.outputs.valid }},
            "source": "ci-full",
            "timestamp": "$(date -Iseconds)"
          }
          EOF

      - name: Upload coverage summary
        if: needs.docs-only-check.outputs.docs_only != 'true'
        uses: actions/upload-artifact@v5
        with:
          name: coverage-summary
          path: coverage-summary.json
          retention-days: 5

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: artifacts/test-results
          retention-days: 3
